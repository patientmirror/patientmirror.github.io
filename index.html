<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Patient MIRROR — Medical Instructional Resource Review Of Representation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">

<style>
:root {
  /* Defaults — overridden inline by React from Tweaks */
  --bg: oklch(98% 0.005 90);
  --bg-soft: oklch(96% 0.008 80);
  --ink: oklch(20% 0.01 270);
  --ink-2: oklch(38% 0.01 270);
  --ink-3: oklch(55% 0.01 270);
  --rule: oklch(20% 0.01 270 / 0.12);
  --rule-soft: oklch(20% 0.01 270 / 0.06);
  --accent: oklch(28% 0.14 265);   /* blue */
  --accent-soft: oklch(28% 0.14 265 / 0.08);
  --gold: oklch(60% 0.13 80);     /* gold */

  --serif: 'Fraunces', 'Source Serif 4', Georgia, serif;
  --sans:  'Inter', ui-sans-serif, system-ui, sans-serif;
  --mono:  'JetBrains Mono', ui-monospace, Menlo, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ─── Layout shell ─────────────────────────────────────── */
.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 48px 64px;
}
.measure {
  max-width: 720px;
}

/* ─── Top bar ──────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 0 0;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 16px;
  margin-bottom: 36px;
}
.wordmark {
  font-family: var(--serif);
  font-size: 22px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: baseline;
  gap: 0;
}
.wordmark .wm-patient {
  font-weight: 400;
}
.wordmark .wm-mirror {
  font-weight: 500;
  font-variant: small-caps;
  letter-spacing: 0.14em;
  margin-left: 0.35em;
  color: var(--gold);
}
.topbar-meta {
  font-size: 12px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: flex;
  gap: 28px;
}
.topbar-meta a { color: inherit; text-decoration: none; }
.topbar-meta a:hover { color: var(--ink); }

/* ─── Hero ─────────────────────────────────────────────── */
.hero {
  padding: 24px 0 24px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 0;
}
.hero-text { min-width: 0; }
.hero-figure {
  position: relative;
  aspect-ratio: 4 / 5;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background:
    repeating-linear-gradient(
      135deg,
      var(--bg-soft) 0 14px,
      var(--bg) 14px 28px
    );
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-figure::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      var(--accent) 0%,
      transparent 30%,
      transparent 70%,
      var(--gold) 100%
    );
  opacity: 0.04;
  pointer-events: none;
}
.hero-figure-content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 24px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-3);
  line-height: 1.6;
}
.hero-figure-content .glyph {
  display: block;
  margin: 0 auto 18px;
  color: var(--accent);
}
.hero-figure-content .glyph-gold { color: var(--gold); }
.hero-figure-content .ph-label {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.1em;
}
.hero-figure-content .ph-caption {
  margin-top: 6px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-2);
  letter-spacing: 0;
  text-transform: none;
  max-width: 24ch;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.4;
}
.hero-figure-corner {
  position: absolute;
  top: 12px;
  left: 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.hero-figure-corner.tr { left: auto; right: 12px; text-align: right; }
.hero-figure-corner.bl { top: auto; bottom: 12px; }
.hero-figure-corner.br { top: auto; left: auto; bottom: 12px; right: 12px; text-align: right; }
.hero-figure-corner b {
  display: block;
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--ink);
  margin-top: 1px;
}
.hero-eyebrow {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
  font-weight: 500;
}
.hero-eyebrow .dot {
  display: inline-block;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--gold);
  margin-right: 8px;
  vertical-align: 2px;
}
.hero h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(28px, 3.4vw, 48px);
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin: 0 0 20px;
  white-space: nowrap;
  text-wrap: nowrap;
}
.hero h1 em {
  font-style: italic;
  color: var(--gold);
}
.hero-lede {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 18px;
  line-height: 1.45;
  color: var(--ink-2);
  text-wrap: pretty;
}

/* ─── Section frame ────────────────────────────────────── */
.section {
  padding: 32px 0 44px;
  border-bottom: 1px solid var(--rule);
}
.section:last-of-type { border-bottom: 0; }
.section-head {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 48px;
  margin-bottom: 28px;
  align-items: baseline;
}
.section-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  text-transform: uppercase;
  padding-top: 8px;
}
.section-num .num {
  color: var(--gold);
  margin-right: 8px;
}
.section-title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 26px;
  letter-spacing: -0.012em;
  line-height: 1.15;
  margin: 0;
  text-wrap: balance;
}
.section-body {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 48px;
}
.section-aside {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.6;
  color: var(--ink-3);
  letter-spacing: 0.02em;
  padding-top: 4px;
}
.section-aside .label {
  display: block;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink);
  margin-bottom: 6px;
  font-weight: 500;
}
.section-aside .row + .row { margin-top: 12px; }

/* ─── About ────────────────────────────────────────────── */
.about-prose {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 16.5px;
  line-height: 1.55;
  color: var(--ink);
  max-width: 680px;
}
.about-prose p { margin: 0 0 0.9em; text-wrap: pretty; }
.about-prose p:last-child { margin-bottom: 0; }
.about-prose .pullquote {
  font-family: var(--serif);
  font-style: italic;
  font-size: 19px;
  line-height: 1.35;
  color: var(--ink);
  border-left: 2px solid var(--gold);
  padding: 2px 0 2px 20px;
  margin: 18px 0;
  font-weight: 300;
}

/* ─── FAQ ──────────────────────────────────────────────── */
.faq-list {
  max-width: 760px;
}
.faq-item {
  border-top: 1px solid var(--rule);
}
.faq-item:last-child { border-bottom: 1px solid var(--rule); }
.faq-q {
  width: 100%;
  display: grid;
  grid-template-columns: 40px 1fr 20px;
  gap: 12px;
  align-items: baseline;
  padding: 14px 0;
  background: transparent;
  border: 0;
  text-align: left;
  cursor: pointer;
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.005em;
  line-height: 1.3;
  transition: color .15s;
}
.faq-q:hover { color: var(--accent); }
.faq-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  color: var(--ink-3);
  letter-spacing: 0.06em;
  position: relative;
  top: -2px;
}
.faq-item.is-open .faq-num { color: var(--gold); }
.faq-chev {
  color: var(--ink-3);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform .25s ease, color .15s;
  align-self: center;
}
.faq-item.is-open .faq-chev {
  transform: rotate(180deg);
  color: var(--accent);
}
.faq-a-wrap {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .3s ease;
}
.faq-item.is-open .faq-a-wrap {
  grid-template-rows: 1fr;
}
.faq-a {
  overflow: hidden;
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink-2);
  padding-left: 52px;
  padding-right: 24px;
}
.faq-item.is-open .faq-a {
  padding-bottom: 18px;
}
.faq-q-text { text-wrap: pretty; }

/* ─── Upload ───────────────────────────────────────────── */
.upload-block {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 32px;
  align-items: start;
}
.upload-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 18px;
}
.upload-copy {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0 0 16px;
  text-wrap: pretty;
}
/* Dropbox upload card — prominent CTA */
.dropbox-card {
  display: grid;
  grid-template-columns: auto 1fr;
  grid-template-rows: auto auto;
  column-gap: 24px;
  row-gap: 12px;
  align-items: center;
  padding: 32px;
  background: var(--bg-soft);
  border: 1px solid var(--rule);
  border-radius: 4px;
  text-decoration: none;
  color: var(--ink);
  transition: border-color .2s, background .2s, transform .2s;
  position: relative;
  overflow: hidden;
}
.dropbox-card:hover {
  border-color: var(--accent);
  background: var(--bg);
}
.dropbox-card:hover .dropbox-card-cta {
  background: var(--accent);
  color: var(--bg);
}
.dropbox-card:hover .dropbox-card-cta svg {
  transform: translate(2px, -2px);
}
.dropbox-card-icon {
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 72px; height: 72px;
  background: var(--bg);
  border-radius: 4px;
  border: 1px solid var(--rule);
  grid-row: 1 / 3;
  align-self: start;
}
.dropbox-card-body {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.dropbox-card-title {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.012em;
  line-height: 1.2;
}
.dropbox-card-sub {
  font-size: 13.5px;
  color: var(--ink-3);
  line-height: 1.45;
}
.dropbox-card-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: var(--ink);
  color: var(--bg);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.01em;
  border-radius: 2px;
  margin-top: 10px;
  width: fit-content;
  transition: background .2s, color .2s;
}
.dropbox-card-cta svg { transition: transform .2s; }
.dropbox-card-meta {
  grid-column: 2 / 3;
  font-size: 11px;
  color: var(--ink-3);
}
.dropbox-card-meta .mono {
  font-family: var(--mono);
  letter-spacing: 0.02em;
}
.upload-footnote-inline {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--rule-soft);
  font-size: 12.5px;
  color: var(--ink-3);
}
.upload-footnote-inline .mono {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-2);
}

/* ─── Dashboard ────────────────────────────────────────── */
.dashboard { display: flex; flex-direction: column; gap: 28px; }

.dash-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.stat-tile {
  padding: 18px 20px 18px 0;
  border-right: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-tile:first-child { padding-left: 0; }
.stat-tile:not(:first-child) { padding-left: 20px; }
.stat-tile:last-child { border-right: 0; }
.stat-label {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.stat-value {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 36px;
  line-height: 1;
  letter-spacing: -0.022em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.stat-sublabel {
  font-size: 12.5px;
  color: var(--ink-3);
}

.dash-main {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 32px;
  align-items: start;
}
.dashboard.layout-stacked .dash-main {
  grid-template-columns: 1fr;
}
.dashboard.layout-schools-first .dash-main {
  grid-template-columns: 1fr 1.1fr;
}
.dashboard.layout-schools-first .dash-panel-dist { order: 2; }
.dashboard.layout-schools-first .dash-panel-schools { order: 1; }

.dash-panel { display: flex; flex-direction: column; gap: 14px; }

.panel-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule);
}
.panel-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.005em;
}
.panel-meta {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Filters */
.filter-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.filter {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
  min-width: 140px;
}
.filter-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
}
.filter select {
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--rule);
  padding: 6px 22px 6px 0;
  font: inherit;
  color: var(--ink);
  cursor: pointer;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23888' d='M0 0h10L5 6z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 4px center;
  border-radius: 0;
  outline: 0;
  transition: border-color .15s;
}
.filter select:hover, .filter select:focus { border-bottom-color: var(--accent); }

/* Distribution chart */
.dist-chart { display: flex; flex-direction: column; gap: 18px; }
.dist-bar {
  display: flex;
  width: 100%;
  height: 32px;
  border-radius: 2px;
  overflow: hidden;
  background: var(--bg-soft);
}
.dist-segment {
  height: 100%;
  background: oklch(from var(--accent) calc(45% + var(--seg-shade, 15%)) calc(c * 0.85) h);
  border-right: 1px solid var(--bg);
  transition: width .35s cubic-bezier(.3,.7,.4,1);
}
.dist-segment:last-child { border-right: 0; }
.dist-legend {
  list-style: none;
  margin: 0; padding: 0;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 8px 24px;
}
.dist-legend li {
  display: grid;
  grid-template-columns: 12px 1fr auto;
  gap: 10px;
  align-items: center;
  font-size: 13.5px;
  color: var(--ink-2);
  padding: 6px 0;
  border-bottom: 1px solid var(--rule-soft);
}
.legend-swatch {
  width: 10px; height: 10px;
  background: oklch(from var(--accent) calc(45% + var(--seg-shade, 15%)) calc(c * 0.85) h);
  border-radius: 1px;
}
.legend-pct {
  font-family: var(--mono);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}

/* School breakdown */
.school-table {
  display: flex; flex-direction: column;
}
.school-row {
  display: grid;
  grid-template-columns: 1.6fr 50px 60px 1.2fr;
  gap: 12px;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
}
.school-row-head {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
  border-bottom: 1px solid var(--rule);
  padding: 8px 0;
}
.school-name { color: var(--ink); }
.school-row .num {
  text-align: right;
  font-family: var(--mono);
  font-size: 12.5px;
  font-variant-numeric: tabular-nums;
  color: var(--ink-2);
}
.bar-col { padding-left: 8px; }
.bar {
  display: block;
  height: 6px;
  background: var(--rule-soft);
  border-radius: 1px;
  overflow: hidden;
}
.bar-fill {
  display: block;
  height: 100%;
  background: var(--accent);
  opacity: 0.7;
}

.dash-footnote {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
  padding-top: 16px;
  border-top: 1px solid var(--rule-soft);
  max-width: 720px;
}

/* ─── Footer ───────────────────────────────────────────── */
.footer {
  padding: 28px 0 0;
  border-top: 1px solid var(--rule);
  margin-top: 32px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 32px;
  align-items: end;
}
.footer-mark {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-3);
  font-style: italic;
}
.footer-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  text-align: right;
  line-height: 1.7;
}

/* ─── Responsive ───────────────────────────────────────── */
@media (max-width: 900px) {
  .page { padding: 0 28px 80px; }
  .topbar { flex-direction: column; align-items: flex-start; gap: 14px; }
  .topbar-meta { gap: 18px; flex-wrap: wrap; }
  .hero { padding: 24px 0 64px; margin-bottom: 64px; }
  .section { padding: 56px 0; }
  .section-head, .section-body { grid-template-columns: 1fr; gap: 24px; }
  .section-aside { order: 2; }
  .upload-block { grid-template-columns: 1fr; gap: 32px; }
  .dash-stats { grid-template-columns: repeat(2, 1fr); }
  .stat-tile { border-right: 0; padding: 20px 0 !important; border-bottom: 1px solid var(--rule); }
  .stat-tile:nth-child(odd) { border-right: 1px solid var(--rule); padding-right: 24px !important; }
  .stat-tile:nth-child(even) { padding-left: 24px !important; }
  .stat-tile:nth-last-child(-n+2) { border-bottom: 0; }
  .dash-main { grid-template-columns: 1fr !important; gap: 48px; }
  .stat-value { font-size: 40px; }
  .school-row { grid-template-columns: 1.4fr 40px 50px 1fr; }
}
</style>
</head>
<body>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>

function TweakRow({ label, value, children, inline = false }) {

      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

  { id: 'a', name: 'School A', files: 47, cases: 312 },
  { id: 'b', name: 'School B', files: 41, cases: 268 },
  { id: 'c', name: 'School C', files: 38, cases: 241 },
  { id: 'd', name: 'School D', files: 34, cases: 219 },
  { id: 'e', name: 'School E', files: 31, cases: 198 },
];

const SPECIALTIES = [
  'Emergency Medicine', 'Internal Medicine', 'Pediatrics', 'Surgery',
  'OB/GYN', 'Psychiatry', 'Family Medicine', 'Cardiology', 'Neurology',
];

// Demographic distribution by category. Numbers are illustrative research-stage
// composites; share-of-cases per dimension.
const DEMOGRAPHICS = {
  'Sex assigned at birth': [
    { label: 'Male',           pct: 58 },
    { label: 'Female',         pct: 41 },
    { label: 'Not specified',  pct:  1 },
  ],
  'Age group': [
    { label: 'Pediatric (0–17)',     pct: 14 },
    { label: 'Young adult (18–39)',  pct: 31 },
    { label: 'Middle-age (40–64)',   pct: 38 },
    { label: 'Older adult (65+)',    pct: 17 },
  ],
  'Race': [
    { label: 'White',                          pct: 64 },
    { label: 'Black or African American',      pct: 11 },
    { label: 'Asian',                          pct:  8 },
    { label: 'American Indian / Alaska Native',pct:  1 },
    { label: 'Other / multiple',               pct:  4 },
    { label: 'Not specified',                  pct: 12 },
  ],
  'Ethnicity': [
    { label: 'Not Hispanic or Latino',  pct: 71 },
    { label: 'Hispanic or Latino',      pct:  9 },
    { label: 'Not specified',           pct: 20 },
  ],
  'Socioeconomic status': [
    { label: 'Mentioned',     pct: 22 },
    { label: 'Not mentioned', pct: 78 },
  ],
};

const DEMOGRAPHIC_DIMENSIONS = Object.keys(DEMOGRAPHICS);

function StatTile({ label, value, sublabel }) {
  return (
    <div className="stat-tile">
      <div className="stat-label">{label}</div>
      <div className="stat-value">{value}</div>
      {sublabel && <div className="stat-sublabel">{sublabel}</div>}
    </div>
  );
}

function SchoolBreakdown({ layout }) {
  const total = SCHOOLS.reduce((s, x) => s + x.cases, 0);
  const max = Math.max(...SCHOOLS.map((s) => s.cases));
  return (
    <div className={`school-breakdown layout-${layout}`}>
      <div className="panel-head">
        <div className="panel-title">By contributing school</div>
        <div className="panel-meta">{SCHOOLS.length} institutions · {total.toLocaleString()} cases</div>
      </div>
      <div className="school-table">
        <div className="school-row school-row-head">
          <span>Institution</span>
          <span className="num">Files</span>
          <span className="num">Cases</span>
          <span className="bar-col">Share</span>
        </div>
        {SCHOOLS.map((s) => (
          <div className="school-row" key={s.id}>
            <span className="school-name">{s.name}</span>
            <span className="num">{s.files}</span>
            <span className="num">{s.cases}</span>
            <span className="bar-col">
              <span className="bar"><span className="bar-fill" style={{ width: `${(s.cases / max) * 100}%` }} /></span>
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function DistributionChart({ dimension, school, specialty }) {
  const data = DEMOGRAPHICS[dimension];
  // Slight deterministic variation by filter selection so the chart visibly
  // responds without faking a real backend.
  const seed = (school + '|' + specialty + '|' + dimension)
    .split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const adjusted = data.map((d, i) => {
    if (school === 'all' && specialty === 'all') return d;
    const wobble = ((seed * (i + 3)) % 11) - 5;
    return { ...d, pct: Math.max(0, Math.min(100, d.pct + wobble)) };
  });
  // Renormalize so it sums to ~100 after wobble.
  const sum = adjusted.reduce((s, x) => s + x.pct, 0) || 1;
  const final = adjusted.map((d) => ({ ...d, pct: Math.round((d.pct / sum) * 100) }));

  return (
    <div className="dist-chart">
      <div className="dist-bar">
        {final.map((d, i) => (
          <span
            key={d.label}
            className="dist-segment"
            style={{ width: `${d.pct}%`, '--seg-shade': `${15 + i * 12}%` }}
            title={`${d.label}: ${d.pct}%`}
          />
        ))}
      </div>
      <ul className="dist-legend">
        {final.map((d, i) => (
          <li key={d.label}>
            <span className="legend-swatch" style={{ '--seg-shade': `${15 + i * 12}%` }} />
            <span className="legend-label">{d.label}</span>
            <span className="legend-pct">{d.pct}%</span>
          </li>
        ))}
      </ul>
    </div>
  );
}

function Dashboard({ layout }) {
  const [school, setSchool] = React.useState('all');
  const [specialty, setSpecialty] = React.useState('all');
  const [dimension, setDimension] = React.useState(DEMOGRAPHIC_DIMENSIONS[2]); // Race default

  const totalSchools = SCHOOLS.length;
  const totalFiles   = SCHOOLS.reduce((s, x) => s + x.files, 0);
  const totalCases   = SCHOOLS.reduce((s, x) => s + x.cases, 0);
  const dimsCovered  = DEMOGRAPHIC_DIMENSIONS.length;

  return (
    <div className={`dashboard layout-${layout}`}>
      <div className="dash-stats">
        <StatTile label="Participating schools"  value={totalSchools} sublabel="contributing" />
        <StatTile label="Files in database"       value={totalFiles.toLocaleString()} sublabel="curricular materials" />
        <StatTile label="Cases analyzed"          value={totalCases.toLocaleString()} sublabel="clinical vignettes" />
        <StatTile label="Demographic dimensions"  value={dimsCovered} sublabel="annotated per case" />
      </div>

      <div className="dash-main">
        <div className="dash-panel dash-panel-dist">
          <div className="panel-head">
            <div>
              <div className="panel-title">Demographic distribution</div>
              <div className="panel-meta">Share of cases · filterable by school & specialty</div>
            </div>
          </div>

          <div className="filter-row">
            <label className="filter">
              <span className="filter-label">Dimension</span>
              <select value={dimension} onChange={(e) => setDimension(e.target.value)}>
                {DEMOGRAPHIC_DIMENSIONS.map((d) => <option key={d} value={d}>{d}</option>)}
              </select>
            </label>
            <label className="filter">
              <span className="filter-label">School</span>
              <select value={school} onChange={(e) => setSchool(e.target.value)}>
                <option value="all">All schools</option>
                {SCHOOLS.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </label>
            <label className="filter">
              <span className="filter-label">Specialty</span>
              <select value={specialty} onChange={(e) => setSpecialty(e.target.value)}>
                <option value="all">All specialties</option>
                {SPECIALTIES.map((s) => <option key={s} value={s}>{s}</option>)}
              </select>
            </label>
          </div>

          <DistributionChart dimension={dimension} school={school} specialty={specialty} />
        </div>

        <div className="dash-panel dash-panel-schools">
          <SchoolBreakdown layout={layout} />
        </div>
      </div>

      <div className="dash-footnote">
        Figures shown are illustrative of the current research-stage corpus and update as new institutions contribute.
        Last refreshed 04/24/2026.
      </div>
    </div>
  );
}

Object.assign(window, { Dashboard });

</script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "emory",
  "typeface": "source-serif",
  "dashboardLayout": "schools-first",
  "accentColor": "#012169",
  "showWordmarkAccent": true
}/*EDITMODE-END*/;

const PALETTES = {
  emory: { bg: 'oklch(98% 0.005 250)', bgSoft: 'oklch(96% 0.010 250)', accent: 'oklch(28% 0.14 265)', ink: 'oklch(18% 0.02 265)' },
  custom: null
};

const TYPEFACES = {
  'source-serif': { serif: "'Source Serif 4', Georgia, serif", sans: "'Inter', system-ui, sans-serif", label: 'Source Serif × Inter' },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const palette = PALETTES[t.palette] || PALETTES.oxblood;
  const accent = t.palette === 'custom' ? t.accentColor : palette.accent;
  const typeface = TYPEFACES[t.typeface] || TYPEFACES['source-serif'];

  const themeStyle = {
    '--bg': palette ? palette.bg : 'oklch(98% 0.005 90)',
    '--bg-soft': palette ? palette.bgSoft : 'oklch(96% 0.008 80)',

    '--accent': accent,
    '--serif': typeface.serif,
    '--sans': typeface.sans
  };

  // Apply to :root so global CSS picks it up
  React.useEffect(() => {
    const root = document.documentElement;
    Object.entries(themeStyle).forEach(([k, v]) => root.style.setProperty(k, v));
  });

  return (
    <div className="page">
      {/* ─── Top bar ───────────────────────── */}
      <header className="topbar">
        <div className="wordmark">
          <span className="wm-patient" style={{ fontFamily: "Inter" }}>Patient</span>
          <span className="wm-mirror" style={{ color: t.showWordmarkAccent ? 'var(--accent)' : 'var(--ink)' }}>MIRROR</span>
        </div>
        <nav className="topbar-meta">
          <a href="#faq">FAQs</a>
          <a href="#contribute">Contribute</a>
          <a href="#dashboard">Dashboard</a>
        </nav>
      </header>

      {/* ─── Hero ──────────────────────────── */}
      <section className="hero" data-screen-label="Hero">
        <div className="hero-text">
          <div className="hero-eyebrow">
            <span className="dot"></span>Research study · Emory University School of Medicine
          </div>
          <h1>Who appears in the cases <em>future clinicians</em> learn from?</h1>
          <p className="hero-lede">
            Patient MIRROR systematically analyzes the demographic composition of clinical
            vignettes used in medical education to identify patterns of representation —
            and omission — across the populations they depict.
          </p>
        </div>
      </section>

      {/* ─── FAQ ───────────────────────────── */}
      <section className="section" id="faq" data-screen-label="FAQ">
        <div className="section-head">
          <div className="section-num"><span className="num">01</span>FAQs</div>
          <h2 className="section-title">Frequently asked questions.</h2>
        </div>
        <div className="section-body">
          <aside className="section-aside">
            <div className="row">
              <span className="label">Don't see your question?</span>
              Email the team and we'll get back to you.
            </div>
            <div className="row">
              <span className="label">Contact</span>
              patientmirror<br />
              (at) gmail (dot) com
            </div>
          </aside>
          <FAQ />
        </div>
      </section>

      {/* ─── Contribute / Upload ──────────── */}
      <section className="section" id="contribute" data-screen-label="Contribute">
        <div className="section-head">
          <div className="section-num"><span className="num">02</span>Contribute materials</div>
          <h2 className="section-title">Upload curricular cases through our secure Dropbox file request.</h2>
        </div>
        <div className="section-body">
          <aside className="section-aside">
            <div className="row">
              <span className="label">Accepted formats</span>
              PDF · DOCX · TXT<br />
              Question-bank exports<br />
              Annotated images
            </div>
            <div className="row">

            <div className="row">

              You may contribute without identifying yourself or naming your institution.

          <DropboxUpload />

      </section>

      {/* ─── Dashboard ─────────────────────── */}
      <section className="section" id="dashboard" data-screen-label="Dashboard">
        <div className="section-head">
          <div className="section-num"><span className="num">03</span>Live corpus</div>
          <h2 className="section-title">The Patient MIRROR database, at a glance.</h2>
        </div>
        <Dashboard layout={t.dashboardLayout} />
      </section>

      {/* ─── Footer ────────────────────────── */}
      <footer className="footer">
        <div className="footer-mark">
          A research project hosted at Emory University School of Medicine.
        </div>
        <div className="footer-meta">
          © 2026 Patient MIRROR<br />
          patientmirror (at) gmail (dot) com
        </div>
      </footer>

      {/* ─── Tweaks ────────────────────────── */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Palette" />
        <TweakSelect label="Theme" value={t.palette}
        options={[
        { value: 'emory', label: 'Emory Blue (default)' },
        { value: 'emory-gold', label: 'Emory Gold' },
        { value: 'oxblood', label: 'Oxblood' },
        { value: 'clinical', label: 'Clinical blue' },
        { value: 'forest', label: 'Forest green' },
        { value: 'graphite', label: 'Graphite' },
        { value: 'custom', label: 'Custom accent…' }]

        onChange={(v) => setTweak('palette', v)} />
        {t.palette === 'custom' &&

        <TweakSection label="Typography" />

        <TweakSection label="Dashboard" />

        options={[
        { value: 'side-by-side', label: 'Split' },
        { value: 'schools-first', label: 'Schools left' },
        { value: 'stacked', label: 'Stacked' }]

        onChange={(v) => setTweak('dashboardLayout', v)} />
      </TweaksPanel>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
